# =============================================
# 橙子学（学科网学生版）产品功能说明
# =============================================

product_name: "橙子学"
product_subtitle: "学科网学生版"
product_slogan: "AI学伴 + 名校真题/卷库 + 全场景学习方案 + 测评学练闭环，搞定小初高全学科自主学习"

target_users:
  - role: "学生"
    grade_range: "小学、初中、高中"
  - role: "家长"
    description: "辅助孩子找资料、检查学习进度"

usage_navigation:
  - need: "搜资源/试卷/学校"
    module: "搜索"
  - need: "不会的题要讲解"
    module: "拍照答疑"
  - need: "整理错题反复练"
    module: "错题本"
  - need: "刷名校真题"
    module: "刷真题"
  - need: "跟教材同步学习"
    module: "同步学 / 同步课"
  - need: "每周巩固"
    module: "周周练"
  - need: "单元检测"
    module: "同步学"
  - need: "考前冲刺"
    module: "备期中/期末 / 备考课"
  - need: "中考/高考系统复习"
    module: "中考/高考·一轮/二轮/三轮"
  - need: "假期预习复习"
    module: "暑假/寒假"
  - need: "学业水平考试"
    module: "备学考"

modules:
  - name: "搜索"
    scene: "搜与问"
    slogan: "精品资源，一键直达"
    description: "支持搜试卷、搜资源、搜学校，输入关键词即可匹配所需内容"

  - name: "拍照答疑"
    scene: "搜与问"
    slogan: "遇到难题不求人，一拍即得"
    description: "支持拍单题、拍整页、跨页拍，分步讲题，可一键加入错题本"

  - name: "错题本"
    scene: "搜与问"
    slogan: "错题不重错，薄弱变强项"
    description: "在线练习、拍照答疑题目均可添加；支持按学科、年级、时间、掌握状态筛选；错题（在线练习部分）可下载打印再练"

  - name: "刷真题"
    scene: "刷真题"
    slogan: "名校卷每日更新，精准学交卷即出报告，AI答疑+举一反三"
    description: "全国各地名校真题试卷实时更新；可按学科、年级、地区、年份等标签精准筛选。提供阶段检测、期中、期末、小升初/中考/高考模考及真题、名校专区。支持试卷全文预览、下载打印作答。标注精准学的试卷支持在线练习，交卷后校对答案/查看解析→标记错题→试卷报告分析薄弱点→选题加入错题本→薄弱知识点专项学习→每道题支持AI答疑、举一反三。支持按百强校、省重点、市重点等筛选学校真卷，可关注学校获取该校试卷。"

  - name: "同步学"
    scene: "学教材"
    slogan: "教材同步，课前课后全覆盖"
    description: "小初高各学科教材同步内容，支持按学科、教材版本、章节筛选。诊薄弱·精准练：配套题组支持下载练/在线练，分层练习，在线练生成检测报告，支持薄弱再练、加入错题本、AI答疑，数学物理学科支持视频讲题。夯基础·学知识：提供重点知识讲练，可全文预览或下载打印。单元测试：按章/单元提供单元测试卷、知识清单、专项练习，支持下载打印并查看答案/解析。"

  - name: "同步课"
    scene: "学教材"
    slogan: "名师视频，同步讲解"
    description: "小初高主学科及主流教材版本同步配套视频讲解课程，在线播放"

  - name: "周周练"
    scene: "学教材"
    slogan: "每周一测，巩固知识"
    description: "小学语数英、主流教材版本配套周测内容，可全文预览或下载打印，以周为维度巩固知识"

  - name: "知识清单"
    scene: "学教材"
    slogan: "梳理脉络，高效复习"
    description: "按学科、年级、教材版本配套提供知识清单，梳理知识脉络，助力归纳复习"

  - name: "备期中/备期末"
    scene: "备考冲刺"
    slogan: "期中期末，有备无患"
    description: "按学科、年级、教材版本提供期中备考学习方案。轻松学：知识清单梳理考点。精准练：专项训练分层练习题组，支持下载练/在线练。试卷：全国各地期中/期末考试真题、模拟卷，标注精准学试卷可在线练→试卷报告→举一反三。"

  - name: "备考课"
    scene: "备考冲刺"
    slogan: "升学备考，视频精讲"
    description: "小升初、中考、高考备考知识点讲解视频课程，在线观看"

  - name: "中考·一轮/二轮/三轮"
    scene: "备考冲刺"
    slogan: "系统备考，有序复习"
    description: "提供各学科中考备考复习方案。一轮夯实基础；二轮强化重难点；三轮全真模拟+高频易错点。诊薄弱：语数物学科专项诊断题组。学典例：典例/考点讲解、考点/记背清单、解题方法、复习讲义。精准练：配套题组，支持下载练/在线练，检测报告，AI答疑，数学物理支持视频讲题。试卷：一模/二模/三模真卷或模拟卷。"

  - name: "高考·一轮/二轮/三轮"
    scene: "备考冲刺"
    slogan: "系统备考，有序复习"
    description: "提供各学科高考备考复习学习方案。一轮夯实基础构建知识体系；二轮强化重难点提升综合能力；三轮全真模拟聚焦高频易错点与抢分预测。学典例、精准练、试卷结构同中考。"

  - name: "备学考"
    scene: "备考冲刺"
    slogan: "学业水平，专项突破"
    description: "高中各科学业水平考试专项复习讲义及仿真模拟卷，支持全文预览、下载打印，查看答案解析"

  - name: "暑假/寒假"
    scene: "假期提升"
    slogan: "假期弯道超车"
    description: "按学科、年级、教材版本筛选新知预习或开学测试等相关的学习内容，支持全文预览、下载打印，可查看答案/解析"

cross_module_features:
  - name: "在线练"
    description: "部分试卷/题组支持在线作答，交卷后自动批改+校对答案，生成学情报告"
  - name: "AI答疑"
    description: "每道在线练习的题目均可调用AI答疑进行分步讲解、举一反三"
  - name: "下载打印"
    description: "支持PDF下载，纸质作答后可扫码查看答案解析"
  - name: "错题本"
    description: "贯穿所有在线练习环节，一键添加，支持多维度筛选和重练"

resource_tags:
  - name: "精准学"
    description: "标注此标签的试卷支持在线练习，交卷后生成完整学情报告"
