# =============================================
# 项目配置
# =============================================

ai:
  provider: "zhipu"           # openai / anthropic / deepseek / zhipu
  model: "glm-4-flash"        # 模型名称
  base_url: "https://open.bigmodel.cn/api/paas/v4"
  api_key_env: "ZHIPU_API_KEY"  # 亦可使用 config/ai_defaults.json（前端）
  temperature: 0.3
  max_tokens: 8000

data:
  feedback_input_dir: "data/input/"
  behavior_log_dir: "data/behavior_logs/"
  output_dir: "data/output/"
  revision_log_file: "data/revisions/revision_log.json"
  learned_rules_file: "data/revisions/learned_rules.json"

path_analysis:
  time_window_minutes: 30
